<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Test - Crear Usuario</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 420px;
      margin: 60px auto;
      padding: 0 20px;
      background: #f5f5f7;
    }
    h1 { color: #222; }
    form {
      background: white;
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    label { display: block; margin-top: 12px; font-weight: 600; }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 14px;
    }
    button {
      margin-top: 18px;
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    .result {
      margin-top: 20px;
      padding: 14px;
      border-radius: 6px;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .success { background: #d1fae5; color: #065f46; }
    .error   { background: #fee2e2; color: #991b1b; }
    .hints { font-size: 12px; color: #666; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Crear Usuario</h1>

  <form id="userForm">
    <label for="username">Username</label>
    <input type="text" id="username" required>

    <label for="password">Password</label>
    <input type="password" id="password" required>
    <div class="hints">
      Debe tener: 8+ caracteres, al menos 1 dígito y 1 mayúscula.
    </div>

    <button type="submit">Crear cuenta</button>
  </form>

  <div id="result"></div>

  <script>
    const API_URL = "http://127.0.0.1:8000/user";
    const form = document.getElementById("userForm");
    const resultDiv = document.getElementById("result");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      resultDiv.className = "";
      resultDiv.textContent = "Enviando...";

      const payload = {
        username: document.getElementById("username").value,
        password: document.getElementById("password").value,
      };

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        const data = await res.json();

        if (res.ok) {
          resultDiv.className = "result success";
          resultDiv.textContent = `✅ ${data.message}\nUsuario: ${data.name}`;
        } else {
          // FastAPI devuelve errores de Pydantic en data.detail
          const msg = Array.isArray(data.detail)
            ? data.detail.map(d => `• ${d.msg}`).join("\n")
            : JSON.stringify(data, null, 2);
          resultDiv.className = "result error";
          resultDiv.textContent = `❌ Validación fallida:\n${msg}`;
        }
      } catch (err) {
        resultDiv.className = "result error";
        resultDiv.textContent = `❌ Error de red: ${err.message}\n¿Está corriendo el backend en http://127.0.0.1:8000?`;
      }
    });
  </script>
</body>
</html>
